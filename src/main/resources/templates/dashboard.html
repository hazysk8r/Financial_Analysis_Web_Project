<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DART 금융 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">📊 공기업 IT 심사역 대시보드</h2>
                <p class="text-muted">DART API 및 MySQL DB와 연동된 실시간 기업 목록입니다.</p>
                
                <table class="table table-striped table-hover border text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>DART 고유번호</th>
                            <th>기업명</th>
                            <th>주식 종목코드</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="company : ${companies}">
                            <td th:text="${company.corpCode}">00000000</td>
                            <td th:text="${company.corpName}" class="fw-bold">테스트기업</td>
                            <td th:text="${company.stockCode}">000000</td>
                        </tr>
                    </tbody>
                </table>
                
            </div>
        </div>
    </div>
</body>
</html>
